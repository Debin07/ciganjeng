<!DOCTYPE html>
<html lang="id">
  <div id="head"></div>

  <body>
    <header class="header">
      <div id="navbar"></div>
    </header>

    <section class="kontak">
      <div class="pcontainer">
        <div class="section-title">
          <h2>Hubungi Kami</h2>
          <div class="line"></div>
          <p>Silakan hubungi kami untuk informasi lebih lanjut</p>
        </div>

        <div class="kontak-wrapper">
          <!-- INFO -->
          <div class="kontak-info">
            <h3>Informasi Kontak</h3>

            <p>
              <strong>Alamat:</strong><br />
              Jl. Raya Pangandaran No. 833
            </p>

            <p>
              <strong>Email:</strong><br />
              desaciganjeng@email.com
            </p>

            <p>
              <strong>Telepon:</strong><br />
              0812-3456-7890
            </p>
          </div>

          <!-- FORM -->
          <form class="kontak-form">
            <input type="text" placeholder="Nama" required />
            <input type="email" placeholder="Email" required />
            <textarea placeholder="Pesan" rows="5" required></textarea>
            <button type="submit">Kirim Pesan</button>
          </form>
        </div>

        <!-- MAP -->
        <div class="map">
          <iframe
            src="https://www.google.com/maps/embed?pb=!1m14!1m8!1m3!1d3954.873844190049!2d108.712911!3d-7.5887077!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x2e659c7f22725b8d%3A0xdb2958ee759000df!2sKantor%20Desa%20Ciganjeng!5e0!3m2!1sid!2sid!4v1777437752422!5m2!1sid!2sid"
            width="100%"
            height="300"
            style="border: 0"
            loading="lazy"
          >
          </iframe>
        </div>
      </div>
    </section>

    <div id="footer"></div>
    <script src="/js/script.js"></script>
  </body>
</html>
